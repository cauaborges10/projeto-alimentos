name: Pipeline CI

on: [push]

jobs:
  test:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: db_alimentos
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependências
      run: |
        pip install pytest mysql-connector-python

    - name: Esperar MySQL iniciar
      run: sleep 30

    - name: Criar banco e tabela
      run: mysql -h 127.0.0.1 -uroot -proot < schema.sql

    - name: Rodar testes
      run: pytest -s -v
